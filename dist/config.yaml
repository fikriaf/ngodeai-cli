version: 2
project_name: ngodeai-cli
release:
  github:
    owner: fikriaf
    name: ngodeai-cli
  prerelease: auto
  name_template: '{{.Tag}}'
  header: |
    ## NgodeAI CLI v{{ .Version }}

    Terminal AI coding assistant built with Go.

    ### Quick Install

    ```bash
    curl -fsSL https://raw.githubusercontent.com/fikriaf/ngodeai-cli/main/install | bash
    ```

    ### Downloads

    | Platform | File |
    |----------|------|
    | Linux (amd64) | `ngodeai_{{ .Version }}_linux_amd64.tar.gz` |
    | Linux (arm64) | `ngodeai_{{ .Version }}_linux_arm64.tar.gz` |
    | macOS (amd64) | `ngodeai_{{ .Version }}_darwin_amd64.tar.gz` |
    | macOS (arm64) | `ngodeai_{{ .Version }}_darwin_arm64.tar.gz` |
    | Windows (amd64) | `ngodeai_{{ .Version }}_windows_amd64.zip` |
    | Windows (arm64) | `ngodeai_{{ .Version }}_windows_arm64.zip` |
  footer: |
    ---

    **Full Changelog**: https://github.com/fikriaf/ngodeai-cli/compare/{{ .PreviousTag }}...{{ .Tag }}
  mode: replace
builds:
  - id: ngodeai
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    goamd64:
      - v1
    go386:
      - sse2
    goarm:
      - "6"
    goarm64:
      - v8.0
    gomips:
      - hardfloat
    goppc64:
      - power8
    goriscv64:
      - rva20u64
    targets:
      - linux_amd64_v1
      - linux_arm64_v8.0
      - darwin_amd64_v1
      - darwin_arm64_v8.0
      - windows_amd64_v1
      - windows_arm64_v8.0
    dir: .
    main: .
    binary: ngodeai
    builder: go
    tool: go
    command: build
    ldflags:
      - -s -w
      - -X github.com/fikriaf/ngodeai-cli/cmd.version={{ .Version }}
      - -X github.com/fikriaf/ngodeai-cli/cmd.commit={{ .Commit }}
      - -X github.com/fikriaf/ngodeai-cli/cmd.date={{ .Date }}
    env:
      - CGO_ENABLED=0
    overrides:
      - goos: windows
        goarch: arm64
        env:
          - CGO_ENABLED=0
archives:
  - id: default
    builds_info:
      mode: 493
    name_template: '{{ .ProjectName }}_ {{- .Version }}_ {{- .Os }}_ {{- .Arch }}'
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
        format: zip
    files:
      - src: LICENSE
      - src: README.md
      - src: install
snapshot:
  version_template: '{{ .Tag }}-next'
checksum:
  name_template: checksums.txt
  algorithm: sha256
changelog:
  filters:
    exclude:
      - '^ci:'
      - '^test:'
      - '^style:'
      - Merge pull request
      - Merge branch
  sort: asc
  use: github
  format: '{{ .SHA }}: {{ .Message }} ({{ with .AuthorUsername }}@{{ . }}{{ else }}{{ .AuthorName }} <{{ .AuthorEmail }}>{{ end }})'
  groups:
    - title: "\U0001F680 Features"
      regexp: ^.*?feat(\(.+\))??!?:.+$
    - title: "\U0001F41B Bug Fixes"
      regexp: ^.*?fix(\(.+\))??!?:.+$
      order: 1
    - title: "\U0001F4D6 Documentation"
      regexp: ^.*?docs(\(.+\))??!?:.+$
      order: 2
    - title: "\U0001F9F9 Chores"
      regexp: ^.*?chore(\(.+\))??!?:.+$
      order: 3
    - title: Other Changes
      order: 999
dist: dist
env_files:
  github_token: ~/.config/goreleaser/github_token
  gitlab_token: ~/.config/goreleaser/gitlab_token
  gitea_token: ~/.config/goreleaser/gitea_token
before:
  hooks:
    - go mod tidy
    - go mod download
source:
  name_template: '{{ .ProjectName }}-{{ .Version }}'
  format: tar.gz
gomod:
  gobinary: go
announce:
  skip: '{{ if .Prerelease }}true{{ end }}'
  twitter:
    message_template: '{{ .ProjectName }} {{ .Tag }} is out! Check it out at {{ .ReleaseURL }}'
  mastodon:
    message_template: '{{ .ProjectName }} {{ .Tag }} is out! Check it out at {{ .ReleaseURL }}'
    server: ""
  reddit:
    title_template: '{{ .ProjectName }} {{ .Tag }} is out!'
    url_template: '{{ .ReleaseURL }}'
  slack:
    message_template: '{{ .ProjectName }} {{ .Tag }} is out! Check it out at {{ .ReleaseURL }}'
    username: GoReleaser
  discord:
    message_template: '{{ .ProjectName }} {{ .Tag }} is out! Check it out at {{ .ReleaseURL }}'
    author: GoReleaser
    color: "3888754"
    icon_url: https://goreleaser.com/static/avatar.png
  teams:
    title_template: '{{ .ProjectName }} {{ .Tag }} is out!'
    message_template: '{{ .ProjectName }} {{ .Tag }} is out! Check it out at {{ .ReleaseURL }}'
    color: '#2D313E'
    icon_url: https://goreleaser.com/static/avatar.png
  smtp:
    subject_template: '{{ .ProjectName }} {{ .Tag }} is out!'
    body_template: 'You can view details from: {{ .ReleaseURL }}'
  mattermost:
    message_template: '{{ .ProjectName }} {{ .Tag }} is out! Check it out at {{ .ReleaseURL }}'
    title_template: '{{ .ProjectName }} {{ .Tag }} is out!'
    username: GoReleaser
  linkedin:
    message_template: '{{ .ProjectName }} {{ .Tag }} is out! Check it out at {{ .ReleaseURL }}'
  telegram:
    message_template: '{{ mdv2escape .ProjectName }} {{ mdv2escape .Tag }} is out{{ mdv2escape "!" }} Check it out at {{ mdv2escape .ReleaseURL }}'
    parse_mode: MarkdownV2
  webhook:
    message_template: '{ "message": "{{ .ProjectName }} {{ .Tag }} is out! Check it out at {{ .ReleaseURL }}"}'
    content_type: application/json; charset=utf-8
    expected_status_codes:
      - 200
      - 201
      - 202
      - 204
  opencollective:
    title_template: '{{ .Tag }}'
    message_template: '{{ .ProjectName }} {{ .Tag }} is out!<br/>Check it out at <a href="{{ .ReleaseURL }}">{{ .ReleaseURL }}</a>'
  bluesky:
    message_template: '{{ .ProjectName }} {{ .Tag }} is out! Check it out at {{ .ReleaseURL }}'
git:
  tag_sort: -version:refname
github_urls:
  download: https://github.com
gitlab_urls:
  download: https://gitlab.com
